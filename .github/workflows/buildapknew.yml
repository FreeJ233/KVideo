name: Build Android TV APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'

permissions:
  contents: write

jobs:
  build:
    name: Build Android TV APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # 版本读取（package.json 在根目录）
      - name: Get version from package.json
        id: package-version
        working-directory: .
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 安装 Gradle（无需本地 gradlew）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "7.6"          # 可替换为项目所需的版本，如 8.0、8.5 等

      # 可选：验证 Gradle 安装
      - name: Verify Gradle installation
        run: gradle -v

      # 进入 android-tv 子目录构建
      - name: Build with Gradle
        working-directory: ./android-tv
        run: gradle assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Locate generated APK
        working-directory: ./android-tv
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -n1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Rename and prepare APK for upload
        working-directory: ./android-tv
        run: |
          mkdir -p artifacts
          cp "${{ steps.find-apk.outputs.apk_path }}" "artifacts/KVideo.${{ steps.package-version.outputs.version }}.apk"

      - name: Generate Release Notes
        id: release-notes
        run: |
          echo "body=Automated ${{ github.event.inputs.build_type }} build from commit ${{ github.sha }} on $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          body: ${{ steps.release-notes.outputs.body }}
          draft: false
          prerelease: false
          allow_updates: true
          files: android-tv/artifacts/KVideo.${{ steps.package-version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
