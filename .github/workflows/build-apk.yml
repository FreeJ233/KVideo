name: Build Android APK (Debug)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# 设置所有 run 步骤的默认工作目录为 android-tv
defaults:
  run:
    working-directory: android-tv

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # 注意：hashFiles 基于仓库根目录，因此需要包含 android-tv 路径
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-tv/**/*.gradle*', 'android-tv/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # 路径相对于仓库根目录，因为 upload-artifact 默认从仓库根目录查找
          path: android-tv/app/build/outputs/apk/debug/*.apk
